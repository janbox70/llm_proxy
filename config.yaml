## 配置文件
## api_type: openai-compatible | anthropic
##   - openai-compatible: 使用 OpenAI chat/completions 接口
##   - anthropic: 使用 Anthropic messages 接口
## 当请求 /v1/messages 时，如果 provider 的 api_type 是 openai-compatible，会自动转换格式

log_path: ./output

providers:
  qwencodingplan:
    base_url: https://coding.dashscope.aliyuncs.com/v1/
    api_type: openai-compatible
    # api_key: your-qwencodingplan-api-key

  openrouter:
    base_url: https://openrouter.ai/api/v1/
    api_type: openai-compatible
    api_key: your-openrouter-api-key
    authorized_keys:
      -

  dashscope:
    base_url: https://dashscope.aliyuncs.com/apps/anthropic
    api_type: anthropic
    api_key: your-dashscope-api-key
    authorized_keys:
      - 